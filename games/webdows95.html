<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Webdows 98</title>
  <style>
    :root{
      --desktop:#008080;
      --win:#c0c0c0;
      --win-dark:#808080;
      --win-darker:#404040;
      --win-light:#ffffff;
      --title:#000080;
      --title2:#1084d0;
      --text:#000;
      --shadow:#000;
      --taskbar-h:28px;
      --ui-font: "MS Sans Serif", Tahoma, sans-serif;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;background:var(--desktop);font-family:var(--ui-font);color:var(--text);user-select:none}
    button,input,select,textarea{font-family:inherit;font-size:12px}
    button{background:var(--win);border-top:2px solid var(--win-light);border-left:2px solid var(--win-light);border-right:2px solid var(--win-darker);border-bottom:2px solid var(--win-darker);padding:2px 8px;cursor:pointer;min-height:23px}
    button:active,.pressed{border-top:2px solid var(--win-darker);border-left:2px solid var(--win-darker);border-right:2px solid var(--win-light);border-bottom:2px solid var(--win-light)}
    input,select,textarea{background:#fff;border-top:2px solid var(--win-darker);border-left:2px solid var(--win-darker);border-right:2px solid var(--win-light);border-bottom:2px solid var(--win-light);padding:2px 4px}
    .sunken{border-top:2px solid var(--win-darker);border-left:2px solid var(--win-darker);border-right:2px solid var(--win-light);border-bottom:2px solid var(--win-light);background:#fff}
    .raised{border-top:2px solid var(--win-light);border-left:2px solid var(--win-light);border-right:2px solid var(--win-darker);border-bottom:2px solid var(--win-darker);background:var(--win)}
    .hidden{display:none!important}

    #boot,#desktop-wrap,#start-menu{position:fixed;inset:0}
    #boot{z-index:5000;background:#000;color:#0f0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;font:14px monospace}
    #boot .bar{width:min(420px,80vw);height:20px;background:#111;border:1px solid #0f0;padding:2px}
    #boot .fill{height:100%;width:10%;background:linear-gradient(90deg,#0f0,#9f9)}
    #desktop{position:absolute;inset:0;padding-bottom:var(--taskbar-h);overflow:hidden}
    #desktop-bg{position:absolute;inset:0;background:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,.08), transparent 0 20%),
      radial-gradient(circle at 80% 30%, rgba(255,255,255,.06), transparent 0 18%),
      linear-gradient(180deg, rgba(255,255,255,.05), transparent 40%),
      var(--desktop)}
    #desktop-icons{position:absolute;inset:0;padding:10px;display:grid;grid-template-columns:repeat(auto-fill,72px);grid-auto-rows:84px;align-content:start;gap:6px}
    .icon{width:72px;height:84px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;text-align:center;color:#fff;text-shadow:1px 1px 0 #000;cursor:default}
    .icon .glyph{width:32px;height:32px;font-size:28px;line-height:32px;margin-top:2px}
    .icon .label{font-size:11px;line-height:1.15;margin-top:4px;max-width:68px;word-break:break-word}
    .icon.selected .label{background:#000080;color:#fff}

    #taskbar{position:fixed;left:0;right:0;bottom:0;height:var(--taskbar-h);background:var(--win);border-top:2px solid var(--win-light);box-shadow:inset 0 1px 0 #fff;display:flex;align-items:center;gap:4px;padding:2px;z-index:3000}
    #start-btn{min-width:72px;display:flex;align-items:center;gap:4px;font-weight:bold;padding:2px 8px}
    #tasks{flex:1;display:flex;gap:2px;overflow:hidden}
    .task{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:2px 8px;font-size:11px}
    .task.active{background:#9a9a9a}
    #clock{width:72px;text-align:center;font-size:11px;padding:2px 4px}

    #start-menu{z-index:3200;display:none;pointer-events:none}
    #start-panel{position:absolute;left:0;bottom:var(--taskbar-h);width:240px;background:var(--win);border-top:2px solid var(--win-light);border-left:2px solid var(--win-light);border-right:2px solid var(--win-darker);border-bottom:2px solid var(--win-darker);box-shadow:2px 2px 0 #000;pointer-events:auto}
    #start-top{height:44px;background:linear-gradient(90deg,#000080,#1084d0);color:#fff;padding:6px 8px;display:flex;align-items:end;font-size:18px;font-weight:bold}
    .start-item{padding:6px 10px;font-size:12px;cursor:pointer}
    .start-item:hover{background:#000080;color:#fff}
    .divider{height:1px;background:#fff;border-top:1px solid #808080;margin:4px 0}

    .window{position:absolute;background:var(--win);border-top:2px solid var(--win-light);border-left:2px solid var(--win-light);border-right:2px solid var(--win-darker);border-bottom:2px solid var(--win-darker);box-shadow:2px 2px 0 #000;overflow:hidden;min-width:260px;min-height:180px}
    .titlebar{height:20px;background:linear-gradient(90deg,var(--title),var(--title2));color:#fff;display:flex;align-items:center;justify-content:space-between;padding:2px 3px 2px 5px;cursor:move}
    .titlebar.inactive{background:#808080}
    .title-text{font-size:12px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .controls{display:flex;gap:2px}
    .wbtn{width:16px;height:14px;padding:0;display:grid;place-items:center;font-size:10px}
    .content{height:calc(100% - 20px);padding:6px;display:flex;flex-direction:column;gap:6px;overflow:hidden;background:var(--win)}
    .statusbar{display:flex;height:20px}
    .statusbar .sb{flex:1;padding:2px 6px;font-size:11px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
    .statusbar .sb + .sb{border-left:1px solid #808080}
    .field-border{border-top:2px solid var(--win-darker);border-left:2px solid var(--win-darker);border-right:2px solid var(--win-light);border-bottom:2px solid var(--win-light);background:#fff;overflow:hidden}
    .field-border .inner{padding:6px}

    #game-toolbar,#paint-toolbar,#settings-grid{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
    .tool.active{background:#9a9a9a}
    .sep{width:1px;height:20px;background:#808080;border-right:1px solid #fff;margin:0 2px}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .grow{flex:1}
    .small{font-size:11px}
    #game-wrap{display:grid;grid-template-columns:1fr 180px;gap:6px;min-height:0;flex:1}
    #grid{display:grid;grid-template-columns:repeat(18,1fr);grid-auto-rows:1fr;gap:1px;background:#000;padding:4px;min-height:0}
    .cell{background:#222;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:crosshair}
    .t0{background:#1f1f1f}.t1{background:#004a7a}.t2{background:#5a3a1a}.t3{background:#0a6c1a}.t4{background:#666}.t5{background:#8a5a00}.t6{background:#7a005a}
    .sidepanel{display:flex;flex-direction:column;gap:6px;min-width:0}
    .panelbox{padding:6px}
    .list{display:flex;flex-direction:column;gap:2px}
    .list button{text-align:left}

    #paint-canvas{flex:1;background:#fff;display:grid;grid-template-columns:repeat(16,1fr);grid-auto-rows:1fr;gap:1px;min-height:0}
    .px{background:#fff;cursor:crosshair}
    .px.on{background:#000}
    .color-swatch{width:18px;height:18px;border:1px solid #000;cursor:pointer}
    .color-swatch.sel{outline:2px solid #000080}
    .toggle{display:flex;align-items:center;gap:6px}

    #about-body{display:grid;grid-template-columns:1fr 150px;gap:6px;min-height:0}
    #about-portrait{display:grid;place-items:center;font-size:60px}
    #desktop-note{position:absolute;right:8px;top:8px;color:#fff;text-shadow:1px 1px 0 #000;font-size:12px}

    @media (max-width: 900px){
      .window{width:min(96vw,680px)!important;height:min(84vh,520px)!important;left:2vw!important;top:5vh!important}
      #game-wrap,#about-body{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div id="boot">
    <div style="font-size:28px">Webdows 98</div>
    <div>Starting retro shell...</div>
    <div class="bar"><div class="fill" id="boot-fill"></div></div>
  </div>

  <div id="desktop-wrap" class="hidden">
    <div id="desktop">
      <div id="desktop-bg"></div>
      <div id="desktop-note">Right-click not implemented. Double-click icons.</div>
      <div id="desktop-icons"></div>
    </div>

    <div id="start-menu">
      <div id="start-panel">
        <div id="start-top">Webdows 98</div>
        <div class="start-item" data-open="game">🪴  EcoDesk</div>
        <div class="start-item" data-open="files">📁  My Files</div>
        <div class="start-item" data-open="paint">🎨  Paint Pad</div>
        <div class="start-item" data-open="settings">⚙️  Settings</div>
        <div class="start-item" data-open="about">ℹ️  About</div>
        <div class="divider"></div>
        <div class="start-item" id="restart-world">🔄  Reset world</div>
      </div>
    </div>

    <div id="taskbar">
      <button id="start-btn">⊞ Start</button>
      <div id="tasks"></div>
      <div id="clock"></div>
    </div>
  </div>

  <script>
    const desktopWrap = document.getElementById('desktop-wrap');
    const boot = document.getElementById('boot');
    const bootFill = document.getElementById('boot-fill');
    const desktopIcons = document.getElementById('desktop-icons');
    const tasks = document.getElementById('tasks');
