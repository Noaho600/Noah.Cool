    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #FFF8EE;
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    #root { min-height: 100vh; }

    @keyframes bounceIn {
      0%   { transform: translateY(-30px) scale(0.8); opacity: 0; }
      60%  { transform: translateY(4px) scale(1.05); opacity: 1; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }
    @keyframes popIn {
      0%   { transform: scale(0.5); opacity: 0; }
      70%  { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-8px) rotate(-2deg); }
      40% { transform: translateX(8px) rotate(2deg); }
      60% { transform: translateX(-6px) rotate(-1deg); }
      80% { transform: translateX(6px) rotate(1deg); }
    }
    @keyframes float {
      0%,100% { transform: translateY(0px); }
      50%      { transform: translateY(-6px); }
    }
    @keyframes scoreCount {
      from { transform: scale(0.5) rotate(-10deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes unlockPop {
      0%   { transform: translateX(-50%) translateY(20px) scale(0.8); opacity: 0; }
      20%  { transform: translateX(-50%) translateY(0) scale(1.1); opacity: 1; }
      80%  { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
      100% { transform: translateX(-50%) translateY(-10px) scale(0.9); opacity: 0; }
    }
    @keyframes wiggle {
      0%,100% { transform: rotate(0deg); }
      25% { transform: rotate(-3deg); }
      75% { transform: rotate(3deg); }
    }
  </style>
</head>

// ─── CANVAS DRAWING ────────────────────────────────────────────────
function drawLayer(ctx, ing, x, y, w, h, isTop=false, isBottom=false) {
  const style = LAYER_STYLES[ing.id] || { bg: ing.color, stripe: ing.color, top: ing.color, pattern: 'plain' };
  const r = Math.min(h * 0.45, 12);

  ctx.save();

  // Shadow
  ctx.shadowColor = 'rgba(0,0,0,0.18)';
  ctx.shadowBlur = 6;
  ctx.shadowOffsetY = 3;

  // Main shape
  ctx.beginPath();
  if (isTop) {
    // Bread top — dome shape
    ctx.moveTo(x + r, y + h);
    ctx.lineTo(x + w - r, y + h);
    ctx.quadraticCurveTo(x + w, y + h, x + w, y + h - r);
    ctx.lineTo(x + w + 8, y + r * 2);
    ctx.quadraticCurveTo(x + w + 6, y - 2, x + w/2, y - h * 0.3);
    ctx.quadraticCurveTo(x + w/2, y - h * 0.32, x - 6, y + r * 2);
    ctx.lineTo(x, y + h - r);
    ctx.quadraticCurveTo(x, y + h, x + r, y + h);
  } else if (isBottom) {
    // Bread bottom — slight curve on bottom
    ctx.moveTo(x - 6, y);
    ctx.lineTo(x + w + 6, y);
    ctx.lineTo(x + w + 4, y + h - r);
    ctx.quadraticCurveTo(x + w + 4, y + h + 4, x + w - r, y + h + 4);
    ctx.lineTo(x + r, y + h + 4);
    ctx.quadraticCurveTo(x - 4, y + h + 4, x - 4, y + h - r);
    ctx.closePath();
  } else {
    // Regular ingredient — wavy edges
    const wave = Math.min(h * 0.3, 5);
    ctx.moveTo(x, y + wave);
    ctx.bezierCurveTo(x + w*0.25, y - wave, x + w*0.75, y + wave, x + w, y);
    ctx.lineTo(x + w, y + h);
    ctx.bezierCurveTo(x + w*0.75, y + h + wave, x + w*0.25, y + h - wave, x, y + h);
    ctx.closePath();
  }

  // Fill gradient
  const grad = ctx.createLinearGradient(x, y, x, y + h);
  grad.addColorStop(0, style.top);
  grad.addColorStop(0.4, style.bg);
  grad.addColorStop(1, style.stripe);
  ctx.fillStyle = grad;
  ctx.fill();

  ctx.shadowColor = 'transparent';

  // Patterns
  ctx.save();
  ctx.clip();

  if (style.pattern === 'bacon') {
    // Bacon stripes
    for (let i = 0; i < w; i += 18) {
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.fillRect(x + i, y, 9, h);
    }
  } else if (style.pattern === 'cheese') {
    // Cheese holes
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      ctx.ellipse(x + 20 + i * 35, y + h/2, 8, 5, 0, 0, Math.PI*2);
      ctx.fill();
    }
  } else if (style.pattern === 'egg') {
    // Egg yolk
    ctx.fillStyle = '#F8D030';
    ctx.beginPath();
    ctx.ellipse(x + w/2, y + h/2, h * 0.6, h * 0.55, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#FFB300';
    ctx.beginPath();
    ctx.ellipse(x + w/2 - 2, y + h/2 - 2, h * 0.25, h * 0.22, 0, 0, Math.PI*2);
    ctx.fill();
  } else if (style.pattern === 'tomato') {
    // Tomato sections
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x + w/2, y); ctx.lineTo(x + w/2, y + h);
    ctx.moveTo(x + w*0.3, y); ctx.lineTo(x + w*0.3, y + h);
    ctx.moveTo(x + w*0.7, y); ctx.lineTo(x + w*0.7, y + h);
    ctx.stroke();
  } else if (style.pattern === 'veggie') {
    // Veggie texture lines
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1;
    for (let i = 8; i < w; i += 20) {
      ctx.beginPath();
      ctx.moveTo(x + i, y); ctx.lineTo(x + i - 5, y + h);
      ctx.stroke();
    }
  } else if (style.pattern === 'fries') {
    // Fry sticks
    ctx.fillStyle = 'rgba(255,180,0,0.7)';
    for (let i = 0; i < w; i += 12) {
      ctx.fillRect(x + i + 2, y + 2, 6, h - 4);
    }
  } else if (style.pattern === 'candy') {
    // Colorful dots
    const dotColors = ['#FF4081','#00BCD4','#FFEB3B','#4CAF50','#FF5722'];
    for (let i = 0; i < 8; i++) {
      ctx.fillStyle = dotColors[i % dotColors.length];
      ctx.beginPath();
      ctx.arc(x + 15 + i * (w-20)/7, y + h/2, 4, 0, Math.PI*2);
      ctx.fill();
    }
  } else if (style.pattern === 'bread' && (isTop || isBottom)) {
    // Sesame seeds
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    const seedPositions = [[0.2,0.4],[0.5,0.3],[0.75,0.5],[0.35,0.65],[0.65,0.35],[0.15,0.6],[0.85,0.45]];
    seedPositions.forEach(([sx, sy]) => {
      ctx.beginPath();
      ctx.ellipse(x + w*sx, y + h*sy, 4, 2.5, -0.4, 0, Math.PI*2);
      ctx.fill();
    });
  }

  // Sauce drip effect
  if (style.pattern === 'sauce') {
    ctx.fillStyle = style.bg + 'CC';
    for (let i = 0; i < 4; i++) {
      const dx = x + 20 + i * (w - 30)/3;
      ctx.beginPath();
      ctx.ellipse(dx, y + h, 5, 3, 0, 0, Math.PI);
      ctx.fill();
    }
  }

  ctx.restore();

  // Border
  ctx.beginPath();
  if (!isTop && !isBottom) {
    const wave = Math.min(h * 0.3, 5);
    ctx.moveTo(x, y + wave);
    ctx.bezierCurveTo(x + w*0.25, y - wave, x + w*0.75, y + wave, x + w, y);
    ctx.lineTo(x + w, y + h);
    ctx.bezierCurveTo(x + w*0.75, y + h + wave, x + w*0.25, y + h - wave, x, y + h);
    ctx.closePath();
  }
  ctx.strokeStyle = style.stripe;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Emoji label
  ctx.shadowColor = 'transparent';
  ctx.font = `${Math.min(h - 2, 14)}px serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(ing.emoji + ' ' + ing.name, x + 10, y + h/2);

  ctx.restore();
}

// ─── SCORING ENGINE ─────────────────────────────────────────────────
const CRITICS = [
  { name: 'Chef Reginald Brie', title: 'Senior Critic, The Hoagie Review', emoji: '👨‍🍳' },
  { name: 'Madame Fromage',     title: 'Paris Culinary Institute',         emoji: '👩‍🍳' },
  { name: 'Tony "The Stack"',   title: 'World Sandwich Champion 2019',     emoji: '🏆' },
  { name: 'Dr. Phyllis Crust',  title: 'Sandwich Psychology, MIT',         emoji: '🔬' },
  { name: 'Big Mike',           title: 'Just a really hungry guy',         emoji: '😤' },
];

function scoreSandwich(layers) {
  const ids = layers.map(l => l.id);
  const cats = layers.map(l => l.cat);
  let score = 5.0;

  const hasProtein   = ids.some(id => ['beef_patty','bacon','fried_egg','turkey'].includes(id));
  const hasVeggie    = ids.some(id => ['lettuce','tomato','avocado','pickle','onion','mushroom','jalapeno'].includes(id));
  const hasCheese    = ids.some(id => ['cheddar','swiss','blue_cheese'].includes(id));
  const hasSauce     = cats.includes('sauce');
  const weirdCount   = layers.filter(l => l.cat === 'weird').length;
  const total        = layers.length;
  const unique       = new Set(ids).size;

  if (hasProtein) score += 1;
  if (hasVeggie)  score += 0.8;
  if (hasCheese)  score += 0.5;
  if (hasSauce)   score += 0.5;
  if (unique === total) score += 0.5; // no repeats bonus
  if (total >= 4 && total <= 7) score += 0.5;
  if (total > 12) score -= (total - 12) * 0.3;
  if (total > 18) score -= 3;

  // Weird scoring
  if (weirdCount > 0) {
    score -= weirdCount * 0.4;
    score += Math.random() * 2.5; // chaos dice
  }

  // Classic combo bonuses
  if (ids.includes('beef_patty') && ids.includes('cheddar') && ids.includes('lettuce') && ids.includes('tomato')) score += 1.5;
  if (ids.includes('bacon') && ids.includes('fried_egg') && ids.includes('cheddar')) score += 1.2;
  if (ids.includes('avocado') && ids.includes('tomato') && ids.includes('bacon')) score += 1.0;

  // Chaos combos
  if (ids.includes('ice_cream') && ids.includes('beef_patty')) score -= 1.5;
  if (ids.includes('spaghetti') && ids.includes('pizza_slice')) score += 2; // cursed but valid
  if (ids.includes('gummy_bears') && ids.includes('mustard')) score -= 2;

  score += (Math.random() - 0.5) * 1.5;
  return Math.max(0.5, Math.min(10, parseFloat(score.toFixed(1))));
}

function getReview(score, layers) {
  const ids = layers.map(l => l.id);
  const weirdCount = layers.filter(l => l.cat === 'weird').length;

  const openers = {
    high: [
      "I've been reviewing sandwiches for 23 years. This stopped me cold.",
      "An architectural achievement. The audacity of the layering alone deserves an award.",
      "Extraordinary. I texted my mother immediately.",
      "I wept into my napkin. No shame.",
    ],
    mid: [
      "A competent effort. Shows promise, lacks conviction.",
      "Solid. Respectable. Won't win trophies, won't cause arguments.",
      "I've had this exact sandwich on a sad Tuesday. It was fine.",
      "The construction is sound. The ambition is... adequate.",
    ],
    low: [
      "I've been doing this for 30 years. Nothing prepared me for this.",
      "I don't know who hurt you, but this sandwich is the result.",
      "There are no words. Only consequences.",
      "My therapist will be hearing about this.",
    ],
  };

  const tier = score >= 7.5 ? 'high' : score >= 5 ? 'mid' : 'low';
  let text = openers[tier][Math.floor(Math.random() * openers[tier].length)];

  if (ids.includes('ice_cream')) text += " The ice cream is melting into everything. This is either genius or a cry for help.";
  if (ids.includes('spaghetti')) text += " Cold spaghetti in a sandwich is a choice that future historians will study.";
  if (ids.includes('gummy_bears')) text += " The gummy bears add a textural chaos I cannot in good conscience recommend.";
  if (ids.includes('pizza_slice')) text += " A pizza inside a sandwich. The Forbidden Loop. I'm calling someone.";
  if (ids.includes('glitter')) text += " Edible glitter contributes precisely nothing nutritionally but somehow elevates my spirit.";
  if (weirdCount >= 3) text += " The sheer commitment to chaos here is, frankly, inspiring.";
  if (layers.length > 15) text += " I cannot physically see where one ingredient ends and another begins.";

  const closers = {
    high: ["Would order again. Immediately.", "Frame it.", "My legacy is complete."],
    mid:  ["Eat it. Think about what you've done.", "It exists. That's something.", "Inoffensive. Occasionally charming."],
    low:  ["Do not serve this to guests.", "I'm calling the sandwich authorities.", "On behalf of bread everywhere: please stop."],
  };

  text += ' ' + closers[tier][Math.floor(Math.random() * closers[tier].length)];
  return text;
}

// ─── MAIN COMPONENT ─────────────────────────────────────────────────
function SandwichMaker() {
  const [layers, setLayers]           = useState([]);
  const [rating, setRating]           = useState(null);
  const [rateCount, setRateCount]     = useState(() => parseInt(localStorage.getItem('sc_rates')||'0'));
  const [bestScore, setBestScore]     = useState(() => parseFloat(localStorage.getItem('sc_best')||'0'));
  const [hallOfFame, setHallOfFame]   = useState(() => JSON.parse(localStorage.getItem('sc_hof')||'[]'));
  const [unlocked, setUnlocked]       = useState(() => JSON.parse(localStorage.getItem('sc_unlocked')||'["start"]'));
  const [activeTab, setActiveTab]     = useState('bread');
  const [sandwichName, setSandwichName] = useState('');
  const [showHof, setShowHof]         = useState(false);
  const [toastMsg, setToastMsg]       = useState('');
  const [isRating, setIsRating]       = useState(false);
  const [animScore, setAnimScore]     = useState(0);
  const [shake, setShake]             = useState(false);
  const canvasRef = useRef(null);

  const UNLOCK_CONDITIONS = {
    start:  () => true,
    rate3:  () => rateCount >= 3,
    rate5:  () => rateCount >= 5,
    rate7:  () => rateCount >= 7,
    rate10: () => rateCount >= 10,
    rate15: () => rateCount >= 15,
    score8: () => bestScore >= 8,
  };

  const isUnlocked = (ing) => {
    const cond = UNLOCK_CONDITIONS[ing.unlock];
    return cond ? cond() : unlocked.includes(ing.unlock);
  };

  // Draw sandwich on canvas
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;

    ctx.clearRect(0, 0, W, H);

    // Background plate
    ctx.fillStyle = '#FFF8EE';
    ctx.fillRect(0, 0, W, H);

    // Plate shadow/surface
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(W/2, H - 24, W * 0.42, 16, 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.fill();
    ctx.restore();

    if (layers.length === 0) {
      // Empty state
      ctx.font = '48px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.globalAlpha = 0.25;
      ctx.fillText('🍞', W/2, H/2 - 10);
      ctx.globalAlpha = 1;
      ctx.font = '600 14px Nunito, sans-serif';
      ctx.fillStyle = '#BBA88A';
      ctx.fillText('Click an ingredient to start!', W/2, H/2 + 38);
      return;
    }

    // Calculate total height
    const PADDING = 16;
    const ingW = W - PADDING * 2;
    const ingX = PADDING;

    // Bottom bread height
    const bottomH = 32;
    const topH = 36;
    const totalLayerH = layers.reduce((s, l) => s + l.h + 4, 0);
    const totalH = bottomH + totalLayerH + topH;
    const maxH = H - 60;
    const scale = totalH > maxH ? maxH / totalH : 1;

    let currentY = H - 32 - bottomH * scale;

    // Draw bottom bread
    const bottomBread = layers[0]; // use the bread type from first added bread if any
    const breadIngForBottom = layers.find(l => l.cat === 'bread') || ING_MAP['bread_white'];
    drawLayer(ctx, breadIngForBottom, ingX, currentY, ingW, bottomH * scale, false, true);
    currentY -= 2;

    // Draw fillings bottom to top
    layers.forEach((ing, idx) => {
      const lh = ing.h * scale + 2;
      currentY -= lh;
      drawLayer(ctx, ing, ingX, currentY, ingW, ing.h * scale);
    });

    // Draw top bread
    currentY -= topH * scale;
    drawLayer(ctx, breadIngForBottom, ingX, currentY, ingW, topH * scale, true, false);

    // Layer count indicator
    ctx.font = '600 12px Nunito, sans-serif';
    ctx.fillStyle = '#BBA88A';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(`${layers.length} ingredient${layers.length !== 1 ? 's' : ''} inside`, W/2, H - 4);

  }, [layers]);

  const addIngredient = useCallback((ing) => {
    if (!isUnlocked(ing)) return;
    if (layers.length >= 20) {
      showToast("That's enough. The sandwich is at capacity! 🏗️");
      return;
    }
    setLayers(prev => [...prev, ing]);
    setRating(null);

    // Check new unlocks
    const newRates = rateCount;
    const newBest  = bestScore;
    const newlyUnlocked = [];
    INGREDIENTS.forEach(i => {
      if (unlocked.includes(i.unlock)) return;
      const cond = UNLOCK_CONDITIONS[i.unlock];
      if (cond && cond()) newlyUnlocked.push(i.unlock);
    });
    if (newlyUnlocked.length > 0) {
      const next = [...new Set([...unlocked, ...newlyUnlocked])];
      setUnlocked(next);
      localStorage.setItem('sc_unlocked', JSON.stringify(next));
      showToast('🎉 New weird toppings unlocked! Check the Weird tab!');
    }
  }, [layers, unlocked, rateCount, bestScore]);

  const removeLayer = (idx) => {
    setLayers(prev => prev.filter((_, i) => i !== idx));
    setRating(null);
  };

  const clearSandwich = () => {
    setLayers([]);
    setRating(null);
    setSandwichName('');
  };

  const showToast = (msg) => {
    setToastMsg(msg);
    setTimeout(() => setToastMsg(''), 3000);
  };

  const NAME_ADJS = ['Magnificent','Legendary','Towering','Cursed','Chaotic','Blessed','Forbidden','Glorious','Suspicious','Eternal'];
  const NAME_NOUNS = ['Stack','Masterpiece','Situation','Catastrophe','Dream','Creation','Achievement','Statement','Experience','Journey'];
  const shuffleName = () => {
    const adj  = NAME_ADJS[Math.floor(Math.random() * NAME_ADJS.length)];
    const noun = NAME_NOUNS[Math.floor(Math.random() * NAME_NOUNS.length)];
    setSandwichName(`The ${adj} ${noun}`);
  };

  const rateSandwich = async () => {
    if (layers.length === 0) return;
    setIsRating(true);
    setShake(true);
    setTimeout(() => setShake(false), 600);

    await new Promise(r => setTimeout(r, 700));

    const score  = scoreSandwich(layers);
    const review = getReview(score, layers);
    const critic = CRITICS[Math.floor(Math.random() * CRITICS.length)];
    const weirdCount = layers.filter(l => l.cat === 'weird').length;

    // animate score
    let cur = 0;
    const interval = setInterval(() => {
      cur += score / 25;
      if (cur >= score) { cur = score; clearInterval(interval); }
      setAnimScore(parseFloat(cur.toFixed(1)));
    }, 30);

    const tags = [];
    if (score >= 8) tags.push({ label: '⭐ Masterpiece', color: '#27AE60' });
    if (score >= 6 && score < 8) tags.push({ label: '👍 Well Made', color: '#2980B9' });
    if (score < 4) tags.push({ label: '😬 Needs Work', color: '#E74C3C' });
    if (layers.some(l => ['beef_patty','bacon','turkey','fried_egg'].includes(l.id))) tags.push({ label: '💪 Protein Power', color: '#8E44AD' });
    if (layers.some(l => l.cat === 'veggie')) tags.push({ label: '🥗 Veggie Lover', color: '#27AE60' });
    if (weirdCount >= 2) tags.push({ label: '🌀 Certified Chaotic', color: '#E67E22' });
    if (weirdCount >= 1) tags.push({ label: `🎲 ${weirdCount}× Weird`, color: '#9B59B6' });
    if (layers.length > 12) tags.push({ label: '🏗️ Tower of Chaos', color: '#E74C3C' });

    setRating({ score, review, critic, tags });
    setIsRating(false);

    const newCount = rateCount + 1;
    const newBest  = Math.max(bestScore, score);
    setRateCount(newCount);
    setBestScore(newBest);
    localStorage.setItem('sc_rates', newCount);
    localStorage.setItem('sc_best', newBest);

    // Check unlocks after rating
    const newUnlocked = [...unlocked];
    let changed = false;
    INGREDIENTS.forEach(i => {
      if (newUnlocked.includes(i.unlock)) return;
      if (i.unlock === 'rate3'  && newCount >= 3)  { newUnlocked.push(i.unlock); changed = true; }
      if (i.unlock === 'rate5'  && newCount >= 5)  { newUnlocked.push(i.unlock); changed = true; }
      if (i.unlock === 'rate7'  && newCount >= 7)  { newUnlocked.push(i.unlock); changed = true; }
      if (i.unlock === 'rate10' && newCount >= 10) { newUnlocked.push(i.unlock); changed = true; }
      if (i.unlock === 'rate15' && newCount >= 15) { newUnlocked.push(i.unlock); changed = true; }
      if (i.unlock === 'score8' && newBest >= 8)   { newUnlocked.push(i.unlock); changed = true; }
    });
    if (changed) {
      setUnlocked(newUnlocked);
      localStorage.setItem('sc_unlocked', JSON.stringify(newUnlocked));
      showToast('🎉 New ingredients unlocked! Check the tabs!');
    }
  };

  const saveSandwich = () => {
    const name = sandwichName.trim() || 'Unnamed Sandwich';
    const entry = {
      name,
      score: rating.score,
      ingredients: layers.map(l => l.name),
      date: new Date().toLocaleDateString(),
    };
    const newHof = [entry, ...hallOfFame].slice(0, 12);
    setHallOfFame(newHof);
    localStorage.setItem('sc_hof', JSON.stringify(newHof));
    showToast('💾 Sandwich saved to Hall of Fame!');
  };

  const TABS = [
    { id: 'bread',   label: '🍞 Bread',   color: '#F5C842' },
    { id: 'protein', label: '🥩 Protein',  color: '#E74C3C' },
    { id: 'cheese',  label: '🧀 Cheese',   color: '#F39C12' },
    { id: 'veggie',  label: '🥗 Veggie',   color: '#27AE60' },
    { id: 'sauce',   label: '🫙 Sauce',    color: '#E67E22' },
    { id: 'weird',   label: '🎲 Weird',    color: '#9B59B6' },
  ];

  const tabIngredients = INGREDIENTS.filter(i => i.cat === activeTab);

  const starsFor = (score) => {
    const full  = Math.floor(score / 2);
    const empty = 5 - full;
    return '★'.repeat(full) + '☆'.repeat(empty);
  };

    style: { minHeight: '100vh', display: 'flex', flexDirection: 'column', background: '#FFF8EE' }
  },
    // ── TOPBAR ──
    React.createElement('div', {
      style: {

        padding: '12px 20px', background: '#fff', borderBottom: '2px solid #F0E4D0',
        boxShadow: '0 2px 8px rgba(0,0,0,0.06)', position: 'sticky', top: 0, zIndex: 100,
      }
    },
      React.createElement('a', {
        href: 'index.html',
        style: { textDecoration: 'none', fontSize: 12, color: '#999', background: '#F8F4EE', border: '1px solid #E8DDD0', padding: '6px 14px', borderRadius: 20 }
      }, '← noah.cool'),

      React.createElement('div', { style: { textAlign: 'center' } },
        React.createElement('div', {
          style: { fontFamily: 'Fredoka One, sans-serif', fontSize: 22, color: '#D63C2A', letterSpacing: '-0.5px' }
        }, '🥪 Sandwich Maker'),
        React.createElement('div', { style: { fontSize: 10, color: '#BBA88A', letterSpacing: '0.1em', textTransform: 'uppercase', marginTop: -2 } },
          `rated ${rateCount}× · best: ${bestScore.toFixed(1)}/10`)
      ),

      React.createElement('button', {
        onClick: () => setShowHof(true),
        style: { fontSize: 12, color: '#9B59B6', background: '#F4EEFF', border: '1px solid #D4BFFF', padding: '6px 14px', borderRadius: 20, cursor: 'pointer', fontFamily: 'Nunito, sans-serif' }
      }, '🏆 Hall of Fame'),
    ),

    // ── MAIN LAYOUT ──
    React.createElement('div', {
      style: { display: 'flex', flex: 1, gap: 0, minHeight: 0 }
    },

      // ── LEFT: SANDWICH CANVAS + CONTROLS ──
      React.createElement('div', {

      },

        // Name input
        React.createElement('div', {
          style: { display: 'flex', gap: 8, width: '100%', maxWidth: 400, marginBottom: 16 }
        },
          React.createElement('input', {
            value: sandwichName,
            onChange: e => setSandwichName(e.target.value),
            placeholder: 'Name your sandwich...',
            style: {
              flex: 1, fontFamily: 'Fredoka One, sans-serif', fontSize: 20, color: '#4A3020',
              background: 'transparent', border: 'none', borderBottom: '2px solid #E8D8C0',
              padding: '4px 2px', outline: 'none', letterSpacing: '-0.3px'
            }
          }),
          React.createElement('button', {
            onClick: shuffleName,
            style: { background: 'none', border: 'none', fontSize: 20, cursor: 'pointer', padding: '4px 6px' },
            title: 'Random name'
          }, '🎲'),
        ),

        // Canvas
        React.createElement('canvas', {

        },

            onClick: () => removeLayer(i),
            style: {

              border: `1px solid ${l.cat === 'weird' ? '#D4BFFF' : '#F0D0B8'}`,

        },

          }, '💾 Save to Hall of Fame'),

      // ── RIGHT: INGREDIENT PICKER ──
      React.createElement('div', {

      },

          ? React.createElement('div', { style: { textAlign: 'center', color: '#BBA88A', padding: '30px 0', fontSize: 14 } }, "No saved sandwiches yet!\nRate one and hit Save.")
          : hallOfFame.map((s, i) => React.createElement('div', {
              key: i,
              style: { border: '1.5px solid #F0E4D0', borderRadius: 14, padding: '14px 16px', marginBottom: 10 }
            },
              React.createElement('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 } },
                React.createElement('span', { style: { fontFamily: 'Fredoka One', fontSize: 17, color: '#4A3020' } }, `#${i+1} ${s.name}`),
                React.createElement('span', { style: { fontFamily: 'Fredoka One', fontSize: 22, color: scoreColor(s.score) } }, s.score + '/10'),
              ),
              React.createElement('div', { style: { fontSize: 11, color: '#AA9080' } },
                starsFor(s.score) + ' · ' + s.ingredients.slice(0, 5).join(', ') + (s.ingredients.length > 5 ? '...' : '')),
              React.createElement('div', { style: { fontSize: 10, color: '#CCC', marginTop: 4 } }, s.date),
            ))
      )
    ),

    // ── TOAST ──
    toastMsg && React.createElement('div', {
      style: {
        position: 'fixed', bottom: 24, left: '50%', transform: 'translateX(-50%)',
        background: '#4A3020', color: '#fff', padding: '12px 24px', borderRadius: 30,
        fontSize: 13, fontWeight: 700, zIndex: 300, boxShadow: '0 4px 24px rgba(0,0,0,0.3)',
        animation: 'popIn 0.3s ease both', whiteSpace: 'nowrap',
      }
    }, toastMsg),
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(SandwichMaker));
</script>
</body>
</html>
