<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>If You'd Invested $100 — Noah.cool</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafaf8;--card:#fff;--card2:#f5f5f0;
  --border:#e8e4dc;--border2:#d0c8b8;
  --text:#1a1a14;--muted:#8a8070;--muted2:#b8b0a0;
  --green:#166534;--green-bg:#f0fdf4;--green-border:#bbf7d0;
  --red:#991b1b;--red-bg:#fef2f2;--red-border:#fecaca;
  --gold:#92400e;--gold-bg:#fffbeb;--gold-border:#fde68a;
  --accent:#2d4a8a;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}

.back{position:fixed;top:14px;left:14px;z-index:300;display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);text-decoration:none;background:rgba(250,250,248,0.9);border:1px solid var(--border);padding:6px 13px;border-radius:20px;transition:color .15s;font-family:'DM Mono',monospace;backdrop-filter:blur(8px)}
.back:hover{color:var(--text)}

.page{max-width:820px;margin:0 auto;padding:64px 20px 60px}

h1{font-family:'Instrument Serif',serif;font-size:clamp(32px,5vw,58px);line-height:1.05;letter-spacing:-.02em;margin-bottom:6px;color:var(--text)}
h1 em{font-style:italic;color:var(--accent)}
.subtitle{font-size:13px;color:var(--muted);margin-bottom:36px;font-family:'DM Mono',monospace;letter-spacing:.06em}

/* amount selector */
.amount-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px}
.amt-btn{
  padding:9px 20px;border-radius:999px;
  border:1.5px solid var(--border);background:transparent;
  font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;
  color:var(--muted);transition:all .15s;
}
.amt-btn:hover{border-color:var(--border2);color:var(--text)}
.amt-btn.active{border-color:var(--accent);background:var(--accent);color:#fff}

/* year selector */
.year-row{display:flex;align-items:center;gap:16px;margin-bottom:36px;flex-wrap:wrap}
.year-label{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;white-space:nowrap}
.year-pills{display:flex;gap:6px;flex-wrap:wrap}
.year-pill{padding:6px 14px;border-radius:999px;border:1px solid var(--border);background:transparent;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;color:var(--muted);transition:all .15s}
.year-pill:hover{border-color:var(--border2);color:var(--text)}
.year-pill.active{border-color:var(--accent);color:var(--accent);background:rgba(45,74,138,.06)}

/* results grid */
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:32px}

.result-card{
  border:1.5px solid var(--border);border-radius:16px;padding:20px;
  background:var(--card);position:relative;overflow:hidden;
  transition:all .2s cubic-bezier(.22,1,.36,1);
  cursor:pointer;
}
.result-card:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,0.08);border-color:var(--border2)}
.result-card.winner{border-color:var(--green-border);background:var(--green-bg)}
.result-card.loser{border-color:var(--red-border);background:var(--red-bg)}

.rc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.rc-icon{font-size:24px}
.rc-badge{font-size:9px;font-family:'DM Mono',monospace;letter-spacing:.12em;text-transform:uppercase;padding:3px 9px;border-radius:20px;font-weight:500}
.rc-badge.win{background:var(--green-border);color:var(--green)}
.rc-badge.lose{background:var(--red-border);color:var(--red)}
.rc-badge.mid{background:var(--gold-border);color:var(--gold)}

.rc-name{font-size:16px;font-weight:700;letter-spacing:-.3px;margin-bottom:2px}
.rc-desc{font-size:11px;color:var(--muted);margin-bottom:14px;font-family:'DM Mono',monospace}
.rc-invested{font-size:11px;color:var(--muted);margin-bottom:4px;font-family:'DM Mono',monospace}
.rc-value{font-family:'Instrument Serif',serif;font-size:36px;letter-spacing:-.5px;line-height:1}
.rc-value.up{color:var(--green)}
.rc-value.down{color:var(--red)}
.rc-pct{font-size:13px;font-weight:700;margin-top:4px}
.rc-pct.up{color:var(--green)}
.rc-pct.down{color:var(--red)}

/* chart */
.chart-wrap{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:20px;margin-bottom:20px}
.chart-title{font-size:13px;font-weight:600;margin-bottom:16px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.06em;text-transform:uppercase}
#chartCanvas{width:100%;display:block}

/* fun fact bar */
.fact-bar{background:var(--gold-bg);border:1.5px solid var(--gold-border);border-radius:12px;padding:16px 18px;font-size:13px;color:var(--gold);line-height:1.65;margin-bottom:20px}
.fact-bar strong{color:var(--gold)}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp .35s ease both}
</style>
</head>
<body>
<a class="back" href="index.html">← noah.cool</a>

<div class="page">
  <h1>If You'd Invested <em>$100</em>…</h1>
  <div class="subtitle">// how rich (or broke) would you be today?</div>

  <div class="amount-row" id="amountRow"></div>
  <div class="year-row">
    <span class="year-label">From year:</span>
    <div class="year-pills" id="yearRow"></div>
  </div>

  <div class="results-grid" id="resultsGrid"></div>

  <div class="chart-wrap">
    <div class="chart-title">Growth over time — selected investments</div>
    <canvas id="chartCanvas" height="200"></canvas>
  </div>

  <div class="fact-bar" id="factBar"></div>
</div>

<script>
// ── DATA ──
// Returns approximate multiplier for $1 invested in year Y held until 2025
// Based on real historical returns (approximate)
const ASSETS = [
  {
    id:'sp500', name:'S&P 500',emoji:'📈',desc:'US stock market index',cat:'stocks',
    // annualized ~10.5% since 1928
    annualReturn:0.105,
    startYear:1990,
    funFact: 'The S&P 500 has never failed to recover from a crash — eventually. Patience is the strategy.',
  },
  {
    id:'aapl',name:'Apple (AAPL)',emoji:'🍎',desc:'Consumer tech giant',cat:'stocks',
    // IPO 1980, split-adjusted. Rough CAGR ~25% since 1990
    annualReturn:0.25,startYear:1990,
    yearReturns:{1990:88,2000:0.28,2005:18,2010:9,2015:3.2,2020:3.8},
    funFact: 'Apple is now worth more than the entire GDP of most countries.',
  },
  {
    id:'amzn',name:'Amazon (AMZN)',emoji:'📦',desc:'E-commerce & cloud',cat:'stocks',
    annualReturn:0.38,startYear:1997,
    yearReturns:{1997:1500,2000:0.05,2005:3.2,2010:8,2015:4.8,2020:3.7},
    funFact: 'Amazon stock turned every $100 invested at IPO into over $200,000.',
  },
  {
    id:'googl',name:'Google (GOOGL)',emoji:'🔍',desc:'Search & advertising',cat:'stocks',
    annualReturn:0.22,startYear:2004,
    yearReturns:{2004:300,2005:4,2010:4.5,2015:2.2,2020:2.5},
    funFact: '$100 at Google\'s IPO in 2004 ($85/share) is worth over $4,000 today.',
  },
  {
    id:'tsla',name:'Tesla (TSLA)',emoji:'⚡',desc:'Electric vehicles & energy',cat:'stocks',
    annualReturn:0.55,startYear:2010,
    yearReturns:{2010:7.5,2015:2,2019:10,2020:8,2021:0.7,2022:0.65},
    funFact: 'Tesla stock rose 743% in 2020 alone — the biggest single-year gain for a major car company ever.',
  },
  {
    id:'btc',name:'Bitcoin',emoji:'₿',desc:'First cryptocurrency',cat:'crypto',
    annualReturn:2.1,startYear:2012,
    yearReturns:{2012:100,2013:75,2017:20,2018:0.2,2020:10,2021:1.6,2022:0.35,2023:3,2024:2.5},
    funFact: '$100 in Bitcoin in 2012 would be worth over $5 million today. Nobody told you.',
  },
  {
    id:'eth',name:'Ethereum',emoji:'💎',desc:'Smart contract platform',cat:'crypto',
    annualReturn:1.8,startYear:2016,
    yearReturns:{2016:80,2017:90,2018:0.1,2020:5,2021:5,2022:0.3,2023:1.8,2024:1.5},
    funFact: 'Ethereum introduced "programmable money." It launched at $0.43 in 2015.',
  },
  {
    id:'gold',name:'Gold',emoji:'🥇',desc:'Precious metal safe haven',cat:'commodity',
    annualReturn:0.06,startYear:1990,
    funFact: 'Gold barely beats inflation long-term, but it\'s held value for 5,000 years. That\'s something.',
  },
  {
    id:'realestate',name:'Real Estate',emoji:'🏠',desc:'US housing index (Case-Shiller)',cat:'commodity',
    annualReturn:0.049,startYear:1990,
    funFact: 'Real estate doubles roughly every 18 years. The catch: you need 20× the down payment first.',
  },
  {
    id:'mattress',name:'Under Mattress',emoji:'🛏️',desc:'0% return, 100% inflation loss',cat:'other',
    annualReturn:-0.033,startYear:1990,
    funFact: 'Inflation quietly steals ~3.3% per year. $100 cash from 1990 has the buying power of about $47 today.',
  },
  {
    id:'nflx',name:'Netflix (NFLX)',emoji:'🎬',desc:'Streaming giant',cat:'stocks',
    annualReturn:0.42,startYear:2003,
    yearReturns:{2003:50,2010:18,2011:0.4,2015:1.5,2020:2.3,2021:0.7,2022:0.45,2023:2},
    funFact: 'Reed Hastings mailed Blockbuster a proposal to merge in 2000. Blockbuster laughed him out of the meeting.',
  },
  {
    id:'msft',name:'Microsoft (MSFT)',emoji:'🖥️',desc:'Enterprise software & cloud',cat:'stocks',
    annualReturn:0.195,startYear:1990,
    yearReturns:{1990:4,2000:0.6,2005:0.8,2010:0.9,2015:2,2020:3,2024:1.1},
    funFact: 'Microsoft lost 60% of its value in the dot-com crash, then became the world\'s most valuable company.',
  },
];

const AMOUNTS = [100, 500, 1000, 5000, 10000];
const YEARS   = [1990, 1995, 2000, 2005, 2010, 2015, 2020];

let amount = 100;
let fromYear = 2010;

// ── MATH ──
function getMultiplier(asset, fromYr){
  const years = 2025 - fromYr;
  if(years <= 0) return 1;
  if(fromYr < asset.startYear) return null; // didn't exist

  if(asset.yearReturns){
    let val=1;
    const yr=fromYr;
    // find closest bracket
    const brackets=Object.keys(asset.yearReturns).map(Number).sort((a,b)=>a-b);
    let remaining=years;
    let curYear=yr;
    while(curYear<2025){
      // find applicable bracket
      const applicable=brackets.filter(b=>b<=curYear).pop();
      const mult=applicable?asset.yearReturns[applicable]:null;
      if(!mult){val*=Math.pow(1+asset.annualReturn,1);curYear++;remaining--;}
      else{
        const nextBracket=brackets.find(b=>b>curYear)||2025;
        const yrsInBracket=Math.min(nextBracket-curYear,2025-curYear);
        val*=Math.pow(mult,1/12)||Math.pow(1+asset.annualReturn,yrsInBracket);
        curYear+=yrsInBracket;
      }
    }
    return Math.max(0.01,val);
  }
  return Math.pow(1+asset.annualReturn,years);
}

function calcValue(asset,fromYr,amt){
  const mult=getMultiplier(asset,fromYr);
  if(mult===null) return null;
  return Math.round(amt*mult);
}

function fmt(n){
  if(n>=1e9) return '$'+(n/1e9).toFixed(2)+'B';
  if(n>=1e6) return '$'+(n/1e6).toFixed(2)+'M';
  if(n>=1e3) return '$'+(n/1000).toFixed(0)+'K';
  return '$'+n.toLocaleString();
}

// ── RENDER ──
function renderAmounts(){
  document.getElementById('amountRow').innerHTML=AMOUNTS.map(a=>`
    <button class="amt-btn${a===amount?' active':''}" onclick="setAmount(${a})">$${a.toLocaleString()}</button>
  `).join('');
}
function renderYears(){
  document.getElementById('yearRow').innerHTML=YEARS.map(y=>`
    <button class="year-pill${y===fromYear?' active':''}" onclick="setYear(${y})">${y}</button>
  `).join('');
}

function renderResults(){
  const results=ASSETS.map(a=>{
    const val=calcValue(a,fromYear,amount);
    const pct=val===null?null:((val-amount)/amount*100);
    return {asset:a,val,pct};
  }).filter(r=>r.val!==null).sort((a,b)=>(b.val||0)-(a.val||0));

  document.getElementById('resultsGrid').innerHTML=results.map((r,i)=>{
    const {asset,val,pct}=r;
    const isUp=val>amount, isDown=val<amount;
    const cls=pct>200?'winner':pct<-20?'loser':'';
    const badgeCls=pct>200?'win':pct<0?'lose':'mid';
    const badgeTxt=pct>200?'🚀 Big Win':pct<0?'📉 Lost':pct>50?'✅ Solid':'📊 Modest';
    return `
      <div class="result-card ${cls} fade-in" style="animation-delay:${i*.03}s" onclick="highlightAsset('${asset.id}')">
        <div class="rc-top">
          <span class="rc-icon">${asset.emoji}</span>
          <span class="rc-badge ${badgeCls}">${badgeTxt}</span>
        </div>
        <div class="rc-name">${asset.name}</div>
        <div class="rc-desc">${asset.desc}</div>
        <div class="rc-invested">$${amount.toLocaleString()} invested in ${fromYear}</div>
        <div class="rc-value ${isUp?'up':'down'}">${fmt(val)}</div>
        <div class="rc-pct ${isUp?'up':'down'}">${pct>0?'+':''}${pct.toFixed(0)}%</div>
      </div>
    `;
  }).join('');

  // fact
  const top=results[0];
  if(top){
    document.getElementById('factBar').innerHTML=`
      <strong>💡 Did you know?</strong> ${top.asset.funFact}
    `;
  }

  drawChart(results.slice(0,5));
}

// ── MINI CHART ──
function drawChart(results){
  const canvas=document.getElementById('chartCanvas');
  const dpr=window.devicePixelRatio||1;
  canvas.width=canvas.clientWidth*dpr;
  canvas.height=200*dpr;
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  const W=canvas.clientWidth,H=200;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#fafaf8';ctx.fillRect(0,0,W,H);

  const years=2025-fromYear;
  const pts=Math.min(years,30);
  const colors=['#2d4a8a','#166534','#991b1b','#92400e','#6b21a8'];

  let maxVal=amount;
  results.forEach(r=>{
    for(let i=0;i<=pts;i++){
      const yr=fromYear+Math.round(i/pts*years);
      const v=calcValue(r.asset,fromYear+(yr-fromYear),amount);
      if(v&&v>maxVal) maxVal=v;
    }
  });

  // grid lines
  ctx.strokeStyle='rgba(0,0,0,0.06)';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=H*.08+i*(H*.84)/4;
    ctx.beginPath();ctx.moveTo(40,y);ctx.lineTo(W-10,y);ctx.stroke();
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.font='9px DM Mono,monospace';ctx.textAlign='right';ctx.textBaseline='middle';
    const val=maxVal-(maxVal-amount)*i/4;
    ctx.fillText(fmt(val),36,y);
  }

  // baseline (invested)
  const baseY=H*.08+(H*.84)*((maxVal-amount)/(maxVal-Math.min(amount*.5,1)));
  ctx.strokeStyle='rgba(0,0,0,0.1)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(40,baseY);ctx.lineTo(W-10,baseY);ctx.stroke();
  ctx.setLineDash([]);

  results.forEach((r,ri)=>{
    const color=colors[ri%colors.length];
    ctx.strokeStyle=color;ctx.lineWidth=2;
    ctx.beginPath();
    for(let i=0;i<=pts;i++){
      const t=i/pts;
      const yr=Math.round(fromYear+t*years);
      const v=calcValue(r.asset,yr,amount)||amount;
      const x=40+(W-50)*t;
      const y=H*.08+(H*.84)*(1-(v-Math.min(amount*.5,1))/(maxVal-Math.min(amount*.5,1)));
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke();

    // label
    const lastV=r.val||amount;
    const ly=H*.08+(H*.84)*(1-(lastV-Math.min(amount*.5,1))/(maxVal-Math.min(amount*.5,1)));
    ctx.fillStyle=color;ctx.font='9px DM Mono,monospace';ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText(r.asset.emoji+' '+r.asset.name.split(' ')[0],W-120,Math.max(12,Math.min(H-12,ly)));
  });

  // x axis labels
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.font='9px DM Mono,monospace';ctx.textAlign='center';ctx.textBaseline='top';
  [0,.25,.5,.75,1].forEach(t=>{
    const yr=Math.round(fromYear+t*years);
    const x=40+(W-50)*t;
    ctx.fillText(yr,x,H*.93);
  });
}

function setAmount(a){amount=a;renderAmounts();renderResults();}
function setYear(y){fromYear=y;renderYears();renderResults();}
function highlightAsset(id){
  const a=ASSETS.find(x=>x.id===id);
  if(a)document.getElementById('factBar').innerHTML=`<strong>${a.emoji} ${a.name}:</strong> ${a.funFact}`;
}

renderAmounts();renderYears();renderResults();
window.addEventListener('resize',()=>drawChart([]));
</script>
</body>
</html>
