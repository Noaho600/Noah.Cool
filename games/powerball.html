<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Win the Powerball — Noah.cool</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --bg:       #0a0a1a;
      --bg2:      #11112a;
      --panel:    #14142e;
      --border:   #2a2a50;
      --red:      #e8192c;
      --red2:     #c0101f;
      --red-glow: rgba(232,25,44,0.35);
      --white-ball:#f0f0f0;
      --white2:   #d8d8e8;
      --gold:     #f5c842;
      --gold2:    #d4a020;
      --gold-glow:rgba(245,200,66,0.4);
      --green:    #22c55e;
      --ink:      #ffffff;
      --muted:    #8888bb;
      --text2:    #ccccee;
    }

    html,body{
      min-height:100%;
      background:var(--bg);
      color:var(--ink);
      font-family:'DM Sans',sans-serif;
      overflow-x:hidden;
    }

    /* stars bg */
    body::before{
      content:'';
      position:fixed;inset:0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 40% 8%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 20%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 80% 75%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 35%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 90%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 65%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 55%, rgba(255,255,255,0.5) 0%, transparent 100%);
      pointer-events:none;z-index:0;
    }

    canvas#confetti{position:fixed;inset:0;pointer-events:none;z-index:100;}

    /* ── topbar ── */
    .topbar{
      position:relative;z-index:10;
      padding:18px 24px;
      display:flex;align-items:center;justify-content:space-between;
    }
    .back-btn{
      display:inline-flex;align-items:center;gap:6px;
      font-size:12px;color:var(--muted);
      text-decoration:none;letter-spacing:0.06em;
      background:rgba(255,255,255,0.06);
      border:1px solid var(--border);
      padding:7px 14px;border-radius:20px;
      transition:color 0.15s,background 0.15s;
    }
    .back-btn:hover{color:white;background:rgba(255,255,255,0.1);}

    .jackpot-badge{
      font-family:'Fredoka One',cursive;
      font-size:14px;
      color:var(--bg);
      background:linear-gradient(135deg,var(--gold),#e8a800);
      border-radius:20px;padding:6px 16px;
      box-shadow:0 0 16px var(--gold-glow);
      letter-spacing:0.5px;
      animation:pulse-gold 2s ease-in-out infinite;
    }
    @keyframes pulse-gold{
      0%,100%{box-shadow:0 0 16px var(--gold-glow);}
      50%    {box-shadow:0 0 32px rgba(245,200,66,0.7);}
    }

    /* ── page ── */
    .page{
      position:relative;z-index:5;
      max-width:640px;
      margin:0 auto;
      padding:10px 20px 60px;
      display:flex;flex-direction:column;
      align-items:center;gap:28px;
    }

    /* ── header ── */
    .hero{text-align:center;}
    .hero-title{
      font-family:'Fredoka One',cursive;
      font-size:clamp(36px,7vw,54px);
      letter-spacing:1px;
      background:linear-gradient(135deg,#fff 0%,var(--gold) 60%,var(--red) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
      filter:drop-shadow(0 2px 8px rgba(245,200,66,0.3));
      line-height:1.05;
    }
    .hero-sub{font-size:13px;color:var(--muted);margin-top:6px;font-weight:300;}

    /* ── ticket card ── */
    .ticket{
      width:100%;
      background:linear-gradient(160deg,#1a1a3e,#0e0e28);
      border:1px solid var(--border);
      border-radius:20px;
      padding:28px 28px 24px;
      box-shadow:0 8px 40px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.06);
      position:relative;overflow:hidden;
    }

    /* ticket top stripe */
    .ticket::before{
      content:'';
      position:absolute;top:0;left:0;right:0;height:4px;
      background:linear-gradient(90deg,var(--red2),var(--red),#ff4458,var(--red),var(--red2));
    }

    /* perforated edge */
    .ticket::after{
      content:'';
      position:absolute;left:0;right:0;bottom:72px;height:1px;
      background:repeating-linear-gradient(90deg,transparent,transparent 6px,var(--border) 6px,var(--border) 12px);
    }

    .ticket-label{
      font-size:10px;letter-spacing:0.22em;text-transform:uppercase;
      color:var(--muted);margin-bottom:14px;
      display:flex;align-items:center;justify-content:space-between;
    }

    /* ── number picker ── */
    .section-title{
      font-size:11px;letter-spacing:0.18em;text-transform:uppercase;
      color:var(--muted);margin-bottom:12px;font-weight:600;
    }

    .white-picker{
      display:flex;flex-wrap:wrap;gap:7px;
      margin-bottom:20px;
    }

    .num-ball{
      width:38px;height:38px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:12px;font-weight:700;
      cursor:pointer;
      border:2px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.05);
      color:var(--text2);
      transition:all 0.14s cubic-bezier(.22,.68,0,1.5);
      user-select:none;
    }
    .num-ball:hover{
      background:rgba(255,255,255,0.12);
      color:white;
      transform:scale(1.1);
    }
    .num-ball.selected{
      background:var(--white-ball);
      border-color:white;
      color:#111;
      box-shadow:0 0 12px rgba(255,255,255,0.3);
      transform:scale(1.08);
    }
    .num-ball.pb-ball{
      background:rgba(232,25,44,0.12);
      border-color:rgba(232,25,44,0.3);
      color:var(--red);
    }
    .num-ball.pb-ball:hover{
      background:rgba(232,25,44,0.2);
      color:#ff6677;
      transform:scale(1.1);
    }
    .num-ball.pb-ball.selected{
      background:var(--red);
      border-color:#ff4458;
      color:white;
      box-shadow:0 0 14px var(--red-glow);
    }

    /* ── your ticket display ── */
    .ticket-display{
      display:flex;align-items:center;gap:8px;
      flex-wrap:wrap;
      margin-bottom:18px;
      min-height:48px;
    }

    .ticket-ball{
      width:44px;height:44px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:14px;font-weight:700;
      position:relative;
      transition:all 0.2s cubic-bezier(.22,.68,0,1.5);
    }

    .ticket-ball.white{
      background:radial-gradient(circle at 35% 30%,#ffffff,#c8c8d8);
      color:#222;
      box-shadow:0 3px 10px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.8);
    }
    .ticket-ball.red{
      background:radial-gradient(circle at 35% 30%,#ff4458,var(--red2));
      color:white;
      box-shadow:0 3px 12px var(--red-glow),inset 0 1px 0 rgba(255,255,255,0.3);
    }
    .ticket-ball.empty{
      background:rgba(255,255,255,0.04);
      border:2px dashed rgba(255,255,255,0.12);
      color:rgba(255,255,255,0.15);
      font-size:18px;
    }

    .pb-separator{
      font-size:18px;color:var(--red);font-weight:700;opacity:0.6;
    }

    /* ── bottom of ticket ── */
    .ticket-bottom{
      padding-top:18px;
      display:flex;align-items:center;justify-content:space-between;
      flex-wrap:wrap;gap:10px;
    }

    .powerplay-toggle{
      display:flex;align-items:center;gap:8px;
      cursor:pointer;
      font-size:13px;color:var(--text2);
      user-select:none;
    }

    .toggle-track{
      width:36px;height:20px;
      background:rgba(255,255,255,0.1);
      border:1px solid var(--border);
      border-radius:10px;
      position:relative;
      transition:background 0.2s;
    }
    .toggle-track.on{background:var(--gold);}
    .toggle-knob{
      position:absolute;
      top:2px;left:2px;
      width:16px;height:16px;
      background:white;
      border-radius:50%;
      transition:transform 0.2s;
      box-shadow:0 1px 4px rgba(0,0,0,0.3);
    }
    .toggle-track.on .toggle-knob{transform:translateX(16px);}

    .pp-label{font-weight:600;}
    .pp-cost{font-size:11px;color:var(--muted);}

    .btn-row{display:flex;gap:10px;flex-wrap:wrap;}

    .qp-btn{
      font-family:'DM Sans',sans-serif;
      font-size:13px;font-weight:600;
      color:var(--text2);
      background:rgba(255,255,255,0.07);
      border:1px solid var(--border);
      border-radius:10px;padding:11px 18px;
      cursor:pointer;
      transition:background 0.15s,color 0.15s;
    }
    .qp-btn:hover{background:rgba(255,255,255,0.12);color:white;}

    .play-btn{
      font-family:'Fredoka One',cursive;
      font-size:17px;letter-spacing:0.5px;
      color:white;
      background:linear-gradient(135deg,var(--red),var(--red2));
      border:none;border-radius:12px;
      padding:13px 32px;
      cursor:pointer;
      box-shadow:0 4px 20px var(--red-glow);
      transition:transform 0.15s cubic-bezier(.22,.68,0,1.5),box-shadow 0.15s;
      flex:1;
    }
    .play-btn:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 8px 28px rgba(232,25,44,0.5);}
    .play-btn:active{transform:scale(0.97);}
    .play-btn:disabled{opacity:0.45;cursor:default;transform:none;}

    /* ── drawing animation ── */
    .drawing-stage{
      width:100%;
      background:linear-gradient(160deg,#1a1a3e,#0e0e28);
      border:1px solid var(--border);
      border-radius:20px;
      padding:28px;
      display:none;
      flex-direction:column;
      align-items:center;
      gap:20px;
      box-shadow:0 8px 40px rgba(0,0,0,0.4);
    }

    .drawing-stage.show{display:flex;}

    .drawing-label{
      font-family:'Fredoka One',cursive;
      font-size:16px;color:var(--muted);
      letter-spacing:1px;
    }

    .drawn-balls{
      display:flex;align-items:center;gap:10px;flex-wrap:wrap;
      justify-content:center;
    }

    .drawn-ball{
      width:52px;height:52px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:16px;font-weight:700;
      opacity:0;
      transform:scale(0.3) translateY(-30px);
      transition:opacity 0.35s cubic-bezier(.22,.68,0,1.5),transform 0.35s cubic-bezier(.22,.68,0,1.5);
    }

    .drawn-ball.white{
      background:radial-gradient(circle at 35% 30%,#ffffff,#c0c0d0);
      color:#111;
      box-shadow:0 4px 14px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.9);
    }
    .drawn-ball.red{
      background:radial-gradient(circle at 35% 30%,#ff4458,#a00010);
      color:white;
      box-shadow:0 4px 16px var(--red-glow),inset 0 1px 0 rgba(255,255,255,0.3);
    }
    .drawn-ball.show{opacity:1;transform:scale(1) translateY(0);}

    .drawn-ball.match{
      box-shadow:0 0 0 3px var(--gold),0 4px 20px var(--gold-glow);
    }

    /* ── result panel ── */
    .result-panel{
      width:100%;
      background:linear-gradient(160deg,#1a1a3e,#0e0e28);
      border:1px solid var(--border);
      border-radius:20px;
      padding:28px;
      display:none;
      flex-direction:column;
      align-items:center;
      gap:14px;
      text-align:center;
      box-shadow:0 8px 40px rgba(0,0,0,0.4);
    }
    .result-panel.show{display:flex;}

    .result-emoji{font-size:48px;line-height:1;}
    .result-title{
      font-family:'Fredoka One',cursive;
      font-size:28px;letter-spacing:0.5px;
    }
    .result-prize{
      font-family:'Fredoka One',cursive;
      font-size:42px;
      background:linear-gradient(135deg,var(--gold),#fff8d0);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
      filter:drop-shadow(0 0 12px var(--gold-glow));
    }
    .result-detail{font-size:13px;color:var(--muted);line-height:1.6;max-width:380px;}

    .match-breakdown{
      display:flex;gap:6px;flex-wrap:wrap;justify-content:center;
    }
    .match-chip{
      font-size:11px;font-weight:600;
      padding:4px 10px;border-radius:20px;
      background:rgba(255,255,255,0.06);
      color:var(--text2);border:1px solid var(--border);
    }
    .match-chip.hit{background:rgba(245,200,66,0.15);border-color:var(--gold);color:var(--gold);}

    .play-again{
      font-family:'Fredoka One',cursive;
      font-size:16px;
      color:white;
      background:linear-gradient(135deg,var(--red),var(--red2));
      border:none;border-radius:12px;
      padding:12px 32px;
      cursor:pointer;
      box-shadow:0 4px 20px var(--red-glow);
      margin-top:4px;
      transition:transform 0.15s,box-shadow 0.15s;
    }
    .play-again:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(232,25,44,0.5);}

    /* ── stats bar ── */
    .stats-bar{
      width:100%;
      display:grid;grid-template-columns:repeat(3,1fr);
      gap:12px;
    }

    .stat-card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px 16px;
      text-align:center;
    }
    .stat-val{
      font-family:'Fredoka One',cursive;
      font-size:20px;color:var(--gold);
      display:block;
    }
    .stat-label{font-size:10px;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-top:2px;}

    /* ── odds table ── */
    .odds-section{width:100%;}
    .odds-toggle{
      background:none;border:none;
      font-size:12px;color:var(--muted);
      cursor:pointer;
      display:flex;align-items:center;gap:6px;
      letter-spacing:0.08em;
      padding:0;
      transition:color 0.15s;
    }
    .odds-toggle:hover{color:var(--text2);}
    .odds-table{
      display:none;
      width:100%;
      margin-top:12px;
      border:1px solid var(--border);
      border-radius:14px;
      overflow:hidden;
    }
    .odds-table.open{display:table;}
    .odds-table th,.odds-table td{
      padding:9px 14px;
      font-size:11.5px;
      text-align:left;
      border-bottom:1px solid rgba(255,255,255,0.04);
    }
    .odds-table th{
      background:rgba(255,255,255,0.04);
      color:var(--muted);
      font-weight:600;letter-spacing:0.1em;text-transform:uppercase;font-size:10px;
    }
    .odds-table td:last-child{color:var(--gold);text-align:right;font-weight:600;}
    .odds-table td:nth-child(2){color:var(--muted);text-align:right;}
    .odds-table tr:last-child td{border-bottom:none;}
    .jackpot-row td:first-child{color:var(--gold);}
  </style>
</head>
<body>

<canvas id="confetti"></canvas>

<div class="topbar">
  <a class="back-btn" href="index.html">← noah.cool</a>
  <div class="jackpot-badge" id="jackpotBadge">🏆 Jackpot: $450,000,000</div>
</div>

<div class="page">

  <!-- title -->
  <div class="hero">
    <h1 class="hero-title">Win the Powerball</h1>
    <p class="hero-sub">pick 5 white balls (1–69) + 1 red Powerball (1–26)</p>
  </div>

  <!-- stats -->
  <div class="stats-bar">
    <div class="stat-card">
      <span class="stat-val" id="statTickets">0</span>
      <div class="stat-label">tickets played</div>
    </div>
    <div class="stat-card">
      <span class="stat-val" id="statSpent">$0</span>
      <div class="stat-label">money spent</div>
    </div>
    <div class="stat-card">
      <span class="stat-val" id="statWon">$0</span>
      <div class="stat-label">total won</div>
    </div>
  </div>

  <!-- ticket builder -->
  <div class="ticket" id="ticketPanel">
    <div class="ticket-label">
      <span>your numbers</span>
      <span id="selCount">0 of 5 white • 0 of 1 red</span>
    </div>

    <div class="ticket-display" id="ticketDisplay">
      <!-- filled by JS -->
    </div>

    <div class="section-title">white balls — pick 5</div>
    <div class="white-picker" id="whitePicker"></div>

    <div class="section-title">powerball — pick 1</div>
    <div class="white-picker" id="redPicker"></div>

    <div class="ticket-bottom">
      <label class="powerplay-toggle" onclick="togglePP()">
        <div class="toggle-track" id="ppTrack">
          <div class="toggle-knob"></div>
        </div>
        <span class="pp-label">Power Play</span>
        <span class="pp-cost">(+$1)</span>
      </label>
      <div class="btn-row">
        <button class="qp-btn" onclick="quickPick()">⚡ Quick Pick</button>
        <button class="play-btn" id="playBtn" onclick="playTicket()" disabled>Draw!</button>
      </div>
    </div>
  </div>

  <!-- drawing stage -->
  <div class="drawing-stage" id="drawingStage">
    <div class="drawing-label">🎱 Tonight's Numbers...</div>
    <div class="drawn-balls" id="drawnBalls"></div>
  </div>

  <!-- result -->
  <div class="result-panel" id="resultPanel">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-prize" id="resultPrize" style="display:none"></div>
    <div class="match-breakdown" id="matchBreakdown"></div>
    <div class="result-detail" id="resultDetail"></div>
    <button class="play-again" onclick="resetTicket()">Play Again</button>
  </div>

  <!-- odds table -->
  <div class="odds-section">
    <button class="odds-toggle" onclick="toggleOdds()">
      <span id="oddsArrow">▶</span> prize table & odds
    </button>
    <table class="odds-table" id="oddsTable">
      <thead><tr><th>Match</th><th>Odds (1 in...)</th><th>Prize</th></tr></thead>
      <tbody id="oddsTbody"></tbody>
    </table>
  </div>

</div>

<script>
// ── Prize tiers ──
const PRIZES = [
  { match:5, pb:true,  label:'5 + PB',  odds:292201338, prize:'JACKPOT',   pp:false  },
  { match:5, pb:false, label:'5',        odds:11688054,  prize:1000000,    pp:2      },
  { match:4, pb:true,  label:'4 + PB',  odds:913129,    prize:50000,      pp:true   },
  { match:4, pb:false, label:'4',        odds:36525,     prize:100,        pp:true   },
  { match:3, pb:true,  label:'3 + PB',  odds:14494,     prize:100,        pp:true   },
  { match:3, pb:false, label:'3',        odds:580,       prize:7,          pp:true   },
  { match:2, pb:true,  label:'2 + PB',  odds:701,       prize:7,          pp:true   },
  { match:1, pb:true,  label:'1 + PB',  odds:92,        prize:4,          pp:true   },
  { match:0, pb:true,  label:'PB only', odds:38,        prize:4,          pp:true   },
];

function fmt(n){
  if(n>=1e9) return '$'+(n/1e9).toFixed(0)+'B';
  if(n>=1e6) return '$'+(n/1e6).toFixed(0)+'M';
  if(n>=1e3) return '$'+(n/1e3).toFixed(0)+'K';
  return '$'+n.toLocaleString();
}

// build odds table
const tbody = document.getElementById('oddsTbody');
PRIZES.forEach(p => {
  const tr = document.createElement('tr');
  if(p.prize==='JACKPOT') tr.className='jackpot-row';
  tr.innerHTML = `<td>${p.label}</td><td>${p.odds.toLocaleString()}</td><td>${p.prize==='JACKPOT'?'🏆 Jackpot':fmt(p.prize)}</td>`;
  tbody.appendChild(tr);
});

// ── State ──
let selectedWhite = [];
let selectedPB    = null;
let powerPlay     = false;
let totalTickets  = 0;
let totalSpent    = 0;
let totalWon      = 0;
let jackpot       = 450000000;
const PP_MULT     = [2,3,4,5,10];

// ── Build pickers ──
function buildPickers(){
  const wp = document.getElementById('whitePicker');
  for(let i=1;i<=69;i++){
    const b=document.createElement('div');
    b.className='num-ball';b.textContent=i;b.id='w'+i;
    b.onclick=()=>toggleWhite(i);
    wp.appendChild(b);
  }
  const rp=document.getElementById('redPicker');
  for(let i=1;i<=26;i++){
    const b=document.createElement('div');
    b.className='num-ball pb-ball';b.textContent=i;b.id='r'+i;
    b.onclick=()=>toggleRed(i);
    rp.appendChild(b);
  }
}
buildPickers();
renderDisplay();

function toggleWhite(n){
  if(selectedWhite.includes(n)){
    selectedWhite=selectedWhite.filter(x=>x!==n);
    document.getElementById('w'+n).classList.remove('selected');
  } else {
    if(selectedWhite.length>=5) return;
    selectedWhite.push(n);
    document.getElementById('w'+n).classList.add('selected');
  }
  updateUI();
}

function toggleRed(n){
  if(selectedPB===n){
    selectedPB=null;
    document.getElementById('r'+n).classList.remove('selected');
  } else {
    if(selectedPB) document.getElementById('r'+selectedPB).classList.remove('selected');
    selectedPB=n;
    document.getElementById('r'+n).classList.add('selected');
  }
  updateUI();
}

function togglePP(){
  powerPlay=!powerPlay;
  document.getElementById('ppTrack').classList.toggle('on',powerPlay);
}

function quickPick(){
  // clear current
  selectedWhite.forEach(n=>document.getElementById('w'+n).classList.remove('selected'));
  if(selectedPB) document.getElementById('r'+selectedPB).classList.remove('selected');
  // pick 5 unique from 1-69
  const pool=Array.from({length:69},(_,i)=>i+1);
  selectedWhite=[];
  while(selectedWhite.length<5){
    const idx=Math.floor(Math.random()*pool.length);
    selectedWhite.push(pool.splice(idx,1)[0]);
  }
  selectedPB=1+Math.floor(Math.random()*26);
  selectedWhite.forEach(n=>document.getElementById('w'+n).classList.add('selected'));
  document.getElementById('r'+selectedPB).classList.add('selected');
  updateUI();
}

function updateUI(){
  const count = `${selectedWhite.length} of 5 white • ${selectedPB?1:0} of 1 red`;
  document.getElementById('selCount').textContent=count;
  document.getElementById('playBtn').disabled=!(selectedWhite.length===5&&selectedPB);
  renderDisplay();
}

function renderDisplay(){
  const el=document.getElementById('ticketDisplay');
  el.innerHTML='';
  const sorted=[...selectedWhite].sort((a,b)=>a-b);
  for(let i=0;i<5;i++){
    const d=document.createElement('div');
    if(sorted[i]!==undefined){
      d.className='ticket-ball white';d.textContent=sorted[i];
    } else {
      d.className='ticket-ball empty';d.textContent='?';
    }
    el.appendChild(d);
  }
  const sep=document.createElement('span');
  sep.className='pb-separator';sep.textContent='★';
  el.appendChild(sep);
  const pb=document.createElement('div');
  if(selectedPB){
    pb.className='ticket-ball red';pb.textContent=selectedPB;
  } else {
    pb.className='ticket-ball empty';pb.textContent='?';
  }
  el.appendChild(pb);
}

// ── Draw ──
async function playTicket(){
  if(selectedWhite.length!==5||!selectedPB) return;

  // hide ticket, show drawing
  document.getElementById('ticketPanel').style.display='none';
  document.getElementById('resultPanel').classList.remove('show');
  const stage=document.getElementById('drawingStage');
  stage.classList.add('show');

  // cost
  const cost=powerPlay?3:2;
  totalTickets++;totalSpent+=cost;
  updateStats();

  // draw winning numbers
  const winPool=Array.from({length:69},(_,i)=>i+1);
  const winWhite=[];
  while(winWhite.length<5){
    const idx=Math.floor(Math.random()*winPool.length);
    winWhite.push(winPool.splice(idx,1)[0]);
  }
  winWhite.sort((a,b)=>a-b);
  const winPB=1+Math.floor(Math.random()*26);

  // animate balls appearing
  const container=document.getElementById('drawnBalls');
  container.innerHTML='';
  const allBalls=[...winWhite,null,winPB]; // null = separator

  for(let i=0;i<winWhite.length;i++){
    await delay(420);
    const b=document.createElement('div');
    const matched=selectedWhite.includes(winWhite[i]);
    b.className='drawn-ball white'+(matched?' match':'');
    b.textContent=winWhite[i];
    container.appendChild(b);
    await delay(30);
    b.classList.add('show');
    if(matched) playTone(600,0.15);
  }

  // separator
  const sep=document.createElement('span');
  sep.style.cssText='color:var(--red);font-size:20px;opacity:0.6;font-weight:700;align-self:center;';
  sep.textContent='★';
  container.appendChild(sep);

  await delay(500);
  const pb=document.createElement('div');
  const pbMatched=selectedPB===winPB;
  pb.className='drawn-ball red'+(pbMatched?' match':'');
  pb.textContent=winPB;
  container.appendChild(pb);
  await delay(30);
  pb.classList.add('show');
  if(pbMatched) playTone(440,0.2);

  await delay(900);

  // evaluate
  const matchW=selectedWhite.filter(n=>winWhite.includes(n)).length;
  const matchPB=selectedPB===winPB;
  const result=PRIZES.find(p=>p.match===matchW&&p.pb===matchPB)||null;

  stage.classList.remove('show');
  showResult(result,matchW,matchPB,winWhite,winPB,cost);
}

function showResult(result,matchW,matchPB,winWhite,winPB,cost){
  const panel=document.getElementById('resultPanel');
  panel.classList.add('show');

  let prize=0;
  let ppMult=1;

  if(result){
    if(result.prize==='JACKPOT'){
      prize=jackpot;
    } else {
      prize=result.prize;
      if(powerPlay&&result.pp){
        ppMult=PP_MULT[Math.floor(Math.random()*PP_MULT.length)];
        prize*=ppMult;
      }
    }
    totalWon+=prize;
    updateStats();
  }

  const emojiEl=document.getElementById('resultEmoji');
  const titleEl=document.getElementById('resultTitle');
  const prizeEl=document.getElementById('resultPrize');
  const detailEl=document.getElementById('resultDetail');

  if(!result){
    emojiEl.textContent='😅';
    titleEl.style.color='var(--muted)';
    titleEl.textContent='No Match';
    prizeEl.style.display='none';
    detailEl.textContent=`You matched ${matchW} white ball${matchW!==1?'s':''} and ${matchPB?'the':'no'} Powerball. Odds of the jackpot: 1 in 292,201,338. Keep dreaming!`;
  } else if(result.prize==='JACKPOT'){
    emojiEl.textContent='🏆🎉🏆';
    titleEl.style.color='var(--gold)';
    titleEl.textContent='JACKPOT WINNER!!!';
    prizeEl.style.display='block';
    prizeEl.textContent=fmt(prize);
    detailEl.textContent=`You beat 1 in 292,201,338 odds. You're a statistical miracle. Buy a yacht.`;
    launchConfetti(300);
  } else {
    const msgs=['Nice!','Winner!','Cha-ching!','You won!','Not bad!'];
    emojiEl.textContent=prize>=1000?'💰':prize>=100?'🎉':'✨';
    titleEl.style.color='var(--green)';
    titleEl.textContent=msgs[Math.floor(Math.random()*msgs.length)];
    prizeEl.style.display='block';
    prizeEl.textContent=fmt(prize)+(ppMult>1?` (${ppMult}× Power Play!)`:'');
    detailEl.textContent=`You matched ${result.label}. ${ppMult>1?`Power Play multiplied your $${result.prize} prize by ${ppMult}× to ${fmt(prize)}!`:''}`;
    if(prize>=1000) launchConfetti(80);
    else launchConfetti(30);
  }

  // match breakdown chips
  const mb=document.getElementById('matchBreakdown');
  mb.innerHTML='';
  [...winWhite].sort((a,b)=>a-b).forEach(n=>{
    const c=document.createElement('span');
    c.className='match-chip'+(selectedWhite.includes(n)?' hit':'');
    c.textContent=n;
    mb.appendChild(c);
  });
  const pbc=document.createElement('span');
  pbc.className='match-chip'+(matchPB?' hit':'');
  pbc.textContent='PB:'+winPB;
  mb.appendChild(pbc);

  updateStats();
}

function resetTicket(){
  // clear selections
  selectedWhite.forEach(n=>{const el=document.getElementById('w'+n);if(el)el.classList.remove('selected');});
  if(selectedPB){const el=document.getElementById('r'+selectedPB);if(el)el.classList.remove('selected');}
  selectedWhite=[];selectedPB=null;
  document.getElementById('resultPanel').classList.remove('show');
  document.getElementById('ticketPanel').style.display='block';
  updateUI();

  // grow jackpot a bit
  jackpot+=Math.floor(2000000+Math.random()*5000000);
  document.getElementById('jackpotBadge').textContent='🏆 Jackpot: '+fmt(jackpot);
}

function updateStats(){
  document.getElementById('statTickets').textContent=totalTickets.toLocaleString();
  document.getElementById('statSpent').textContent=fmt(totalSpent);
  document.getElementById('statWon').textContent=fmt(totalWon);
}

function toggleOdds(){
  const t=document.getElementById('oddsTable');
  t.classList.toggle('open');
  document.getElementById('oddsArrow').textContent=t.classList.contains('open')?'▼':'▶';
}

function delay(ms){return new Promise(r=>setTimeout(r,ms));}

// ── Audio ──
let ac;
function playTone(freq,vol){
  try{
    if(!ac) ac=new (window.AudioContext||window.webkitAudioContext)();
    const o=ac.createOscillator();
    const g=ac.createGain();
    o.type='sine';o.frequency.value=freq;
    g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.linearRampToValueAtTime(0,ac.currentTime+0.25);
    o.connect(g);g.connect(ac.destination);
    o.start();o.stop(ac.currentTime+0.25);
  }catch(e){}
}

// ── Confetti ──
const confCanvas=document.getElementById('confetti');
const confCtx=confCanvas.getContext('2d');
confCanvas.width=window.innerWidth;confCanvas.height=window.innerHeight;
window.addEventListener('resize',()=>{confCanvas.width=window.innerWidth;confCanvas.height=window.innerHeight;});
let particles=[];
const CCOLS=['#f5c842','#e8192c','#ffffff','#22c55e','#60a0ff','#ff80aa'];

function launchConfetti(count){
  for(let i=0;i<count;i++){
    particles.push({
      x:Math.random()*confCanvas.width,
      y:confCanvas.height*0.3+Math.random()*confCanvas.height*0.2,
      vx:(Math.random()-0.5)*9,
      vy:-5-Math.random()*9,
      size:5+Math.random()*7,
      color:CCOLS[Math.floor(Math.random()*CCOLS.length)],
      rot:Math.random()*Math.PI*2,rotV:(Math.random()-0.5)*0.25,
      life:1,decay:0.008+Math.random()*0.008,
    });
  }
  if(!confRunning){confRunning=true;drawConf();}
}

let confRunning=false;
function drawConf(){
  confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.3;p.vx*=0.99;
    p.rot+=p.rotV;p.life-=p.decay;
    confCtx.save();
    confCtx.globalAlpha=Math.max(0,p.life);
    confCtx.translate(p.x,p.y);confCtx.rotate(p.rot);
    confCtx.fillStyle=p.color;
    confCtx.fillRect(-p.size/2,-p.size*0.4,p.size,p.size*0.8);
    confCtx.restore();
  });
  if(particles.length>0) requestAnimationFrame(drawConf);
  else confRunning=false;
}
