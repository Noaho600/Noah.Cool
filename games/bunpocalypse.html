<!DOCTYPE html> 

<html lang="en"> 

<head> 

<meta charset="UTF-8"> 

<title>Burger Stacker</title> 

<style> 

  body { 

    background: #f7d488; 

    font-family: "Segoe UI", sans-serif; 

    display: flex; 

    justify-content: center; 

    align-items: center; 

    height: 100vh; 

    margin: 0; 

  } 

 

  canvas { 

    background: #ffe9c4; 

    border: 4px solid #8b4513; 

    border-radius: 10px; 

    box-shadow: 0 0 20px rgba(0,0,0,0.4); 

  } 

 

  #ui { 

    position: absolute; 

    top: 20px; 

    text-align: center; 

    width: 100%; 

    font-size: 20px; 

    color: #5a2d0c; 

    font-weight: bold; 

  } 

 

  #receipt { 

    position: absolute; 

    bottom: 20px; 

    background: white; 

    padding: 15px 20px; 

    border-radius: 8px; 

    border: 2px dashed #333; 

    font-family: monospace; 

    display: none; 

  } 

</style> 

</head> 

<body> 

 

<div id="ui">🍔 Click / Space to drop ingredients</div> 

<canvas id="game" width="320" height="520"></canvas> 

<div id="receipt"></div> 

 

<script> 

const canvas = document.getElementById("game"); 

const ctx = canvas.getContext("2d"); 

const receipt = document.getElementById("receipt"); 

 

// Ingredient sprites (simple colors) 

const INGREDIENTS = [ 

  {name:"Patty", color:"#5a2d0c", height:18}, 

  {name:"Cheese", color:"#ffcc33", height:12}, 

  {name:"Lettuce", color:"#4caf50", height:14}, 

  {name:"Tomato", color:"#e53935", height:14}, 

  {name:"Onion", color:"#d1c4e9", height:12}, 

  {name:"Ketchup", color:"#c62828", height:10}, 

  {name:"Mustard", color:"#fdd835", height:10} 

]; 

 

let stack = []; 

let current = null; 

let direction = 1; 

let speed = 2; 

let misses = 0; 

let gameOver = false; 

 

// Bottom bun 

stack.push({ 

  x: 80, 

  width: 160, 

  y: canvas.height - 40, 

  height: 40, 

  color: "#d9a066", 

  name: "Bottom Bun" 

}); 

 

function newIngredient() { 

  const ing = INGREDIENTS[Math.floor(Math.random() * INGREDIENTS.length)]; 

  current = { 

    x: 0, 

    width: 160, 

    y: stack[stack.length - 1].y - ing.height, 

    height: ing.height, 

    color: ing.color, 

    name: ing.name 

  }; 

} 

 

function drawBlock(b) { 

  ctx.fillStyle = b.color; 

  ctx.fillRect(b.x, b.y, b.width, b.height); 

} 

 

function drawChef() { 

  ctx.fillStyle = "#000"; 

  ctx.font = "28px Arial"; 

  ctx.fillText("👨‍🍳", 130, 120); 

} 

 

function update() { 

  if (gameOver) return; 

 

  ctx.clearRect(0, 0, canvas.width, canvas.height); 

 

  // Move current ingredient 

  current.x += speed * direction; 

  if (current.x <= 0 || current.x + current.width >= canvas.width) { 

    direction *= -1; 

  } 

 

  // Draw stack 

  stack.forEach(drawBlock); 

 

  // Draw moving ingredient 

  drawBlock(current); 

 

  requestAnimationFrame(update); 

} 

 

function dropIngredient() { 

  if (gameOver) return; 

 

  const last = stack[stack.length - 1]; 

 

  // Overlap calculation 

  const overlapStart = Math.max(current.x, last.x); 

  const overlapEnd = Math.min(current.x + current.width, last.x + last.width); 

  const overlap = overlapEnd - overlapStart; 

 

  if (overlap <= 0) { 

    misses++; 

    if (misses >= 3) endGame(); 

    return; 

  } 

 

  // Trim to overlap 

  current.width = overlap; 

  current.x = overlapStart; 

 

  stack.push(current); 

  newIngredient(); 

} 

 

function endGame() { 

  gameOver = true; 

 

  // Add top bun 

  const topBun = { 

    x: stack[stack.length - 1].x, 

    width: stack[stack.length - 1].width, 

    y: stack[stack.length - 1].y - 30, 

    height: 30, 

    color: "#d9a066", 

    name: "Top Bun" 

  }; 

  stack.push(topBun); 

 

  ctx.clearRect(0, 0, canvas.width, canvas.height); 

  stack.forEach(drawBlock); 

  drawChef(); 

 

  // Height calculation 

  let totalHeight = 0; 

  stack.forEach(b => totalHeight += b.height); 

 

  const inches = totalHeight / 5; // scale factor 

  const feet = Math.floor(inches / 12); 

  const leftover = Math.floor(inches % 12); 

 

  receipt.style.display = "block"; 

  receipt.innerHTML = 

    "🍔 BURGER HEIGHT RECEIPT 🍔<br>" + 

    "-----------------------------<br>" + 

    `Total Height: ${feet} ft ${leftover} in<br>` + 

    `Ingredients: ${stack.length - 2}`; 

} 

 

document.addEventListener("keydown", e => { 

  if (e.code === "Space") dropIngredient(); 

}); 

 

canvas.addEventListener("click", dropIngredient); 

 

// Start game 

newIngredient(); 

update(); 

</script> 

 

</body> 

</html>
